services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ratelimiter
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
  ratelimiter:
    build: .
    env_file:
      - .env
    depends_on:
    - redis 
    environment:
    - REDIS_ADDR=redis:6379